<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 翻译</title>
    <style>
        :root {
            --mac-bg: #ececec;
            --mac-window-bg: #fff;
            --mac-toolbar: rgba(246, 246, 246, 0.85);
            --mac-border: rgba(0, 0, 0, 0.1);
            --mac-text: #1d1d1f;
            --mac-text-muted: #86868b;
            --mac-accent: #007aff;
            --mac-divider: rgba(0, 0, 0, 0.06);
            --mac-input-bg: #fff;
            --mac-input-border: rgba(0, 0, 0, 0.15);
            --mac-input-focus: rgba(0, 122, 255, 0.5);
            --mac-log-bg: #1e1e1e;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: var(--mac-bg); 
            color: var(--mac-text); 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }
        .mac-window {
            width: 100%;
            max-width: 1000px;
            height: 820px;
            background: var(--mac-window-bg);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15), 0 0 0 0.5px var(--mac-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .mac-toolbar {
            height: 52px;
            background: var(--mac-toolbar);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 0.5px solid var(--mac-border);
            position: relative;
            z-index: 10;
        }
        .mac-toolbar h1 {
            font-size: 13px;
            font-weight: 600;
            margin: 0;
            color: var(--mac-text);
            letter-spacing: -0.1px;
        }
        .mac-content {
            display: flex;
            flex: 1;
            min-height: 0;
        }
        .mac-sidebar {
            width: 320px;
            background: rgba(246, 246, 246, 0.4);
            border-right: 0.5px solid var(--mac-border);
            padding: 20px;
            overflow-y: auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        .mac-main {
            flex: 1;
            background: var(--mac-log-bg);
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .form-group {
            margin-bottom: 16px;
            flex-shrink: 0;
        }
        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--mac-text-muted);
            margin-bottom: 6px;
        }
        .mac-input, .mac-select {
            width: 100%;
            padding: 5px 8px;
            font-size: 13px;
            border: 0.5px solid var(--mac-input-border);
            border-radius: 6px;
            background: var(--mac-input-bg);
            color: var(--mac-text);
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.1s, box-shadow 0.1s;
            box-shadow: 0 1px 1px rgba(0,0,0,0.02);
            font-family: inherit;
        }
        .mac-input:focus, .mac-select:focus {
            border-color: var(--mac-accent);
            box-shadow: 0 0 0 3px var(--mac-input-focus);
        }
        .flex-row { display: flex; gap: 8px; }
        .flex-row > * { flex: 1; min-width: 0; }
        
        .mac-btn {
            width: 100%;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            border: 0.5px solid var(--mac-border);
            background: #fff;
            color: var(--mac-text);
            box-shadow: 0 1px 1px rgba(0,0,0,0.04);
            font-family: inherit;
            outline: none;
            transition: background 0.1s;
            box-sizing: border-box;
        }
        .mac-btn:active { background: #f0f0f0; }
        
        .mac-btn-primary {
            background: var(--mac-accent);
            color: #fff;
            border: 0.5px solid rgba(0,0,0,0.1);
            border-top-color: rgba(255,255,255,0.2);
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .mac-btn-primary:active { background: #006ee6; }
        .mac-btn-primary.is-translating { background: #d93939; border-color: rgba(0,0,0,0.2); }
        .mac-btn-primary.is-translating:active { background: #c23333; }
        
        .file-upload-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .file-upload-wrapper .mac-btn { flex-shrink: 0; width: auto; }
        #selectedFileName, #glossaryFileName { font-size: 12px; color: var(--mac-text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        #downloadSection {
            margin-top: auto;
            border-top: 0.5px solid var(--mac-border);
            padding-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .hidden { display: none !important; }

        .log-header {
            padding: 8px 16px;
            background: rgba(0,0,0,0.2);
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .log-header span {
            font-size: 11px;
            font-weight: 600;
            color: #a1a1a6;
        }
        #logArea {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            font-family: "SF Mono", Monaco, Consolas, monospace;
            font-size: 12px;
            line-height: 1.5;
            word-break: break-word;
            white-space: pre-wrap;
        }
        #logArea::-webkit-scrollbar { width: 12px; }
        #logArea::-webkit-scrollbar-track { background: transparent; }
        #logArea::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 8px; border: 3px solid var(--mac-log-bg); }
        
        .spinner {
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: #fff;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .log-info { color: #8e8e93; }
        .log-success { color: #30d158; font-weight: 600; }
        .log-warn { color: #ff9f0a; }
        .log-error { color: #ff453a; font-weight: 600; }
        .log-term { color: #0a84ff; }
        .log-stats { color: #bf5af2; font-weight: 600; }
        div:not(.log-stats) + .log-stats { margin-top: 18px; }
    </style>
</head>
<body>
    <div class="mac-window">
        <div class="mac-toolbar">
            <h1>AI 翻译</h1>
        </div>
        <div class="mac-content">
            <div class="mac-sidebar">
                <div class="form-group">
                    <span class="form-label">上传文档 (TXT/MD/HTML/SRT)</span>
                    <div class="file-upload-wrapper">
                        <label for="fileInput" class="mac-btn">选取文件...</label>
                        <span id="selectedFileName">未选择文件</span>
                        <input type="file" id="fileInput" accept=".txt,.md,.html,.htm,.srt,text/plain,text/markdown,text/html,application/xhtml+xml" class="hidden">
                    </div>
                </div>

                <div class="form-group">
                    <span class="form-label">加载术语表（可选）</span>
                    <div class="file-upload-wrapper">
                        <button type="button" id="glossaryBtn" class="mac-btn">选术语表...</button>
                        <span id="glossaryFileName"></span>
                        <input type="file" id="glossaryInput" accept=".csv,text/csv" class="hidden">
                    </div>
                </div>

                <div class="form-group">
                    <span class="form-label">供应商与凭证</span>
                    <div class="flex-row">
                        <select id="providerSelect" class="mac-select" style="flex: 0.5;">
                            <option value="mistral">Mistral</option>
                            <option value="xai">xAI</option>
                            <option value="openai">OpenAI</option>
                            <option value="deepseek">DeepSeek</option>
                            <option value="moonshot">Moonshot</option>
                            <option value="minimax">MiniMax</option>
                            <option value="bigmodel">BigModel</option>
                            <option value="google">Google</option>
                            <option value="anthropic">Anthropic</option>
                            <option value="qwen">阿里云</option>
                            <option value="bedrock">AWS Bedrock</option>
                            <option value="lmstudio">LM Studio</option>
                        </select>
                        <input type="password" id="apiKey" placeholder="API Key" class="mac-input">
                    </div>
                    <div id="awsExtraFields" class="hidden" style="margin-top:8px; display:flex; flex-direction:column; gap:6px;">
                        <input type="password" id="awsSecretKey" placeholder="AWS Secret Access Key" class="mac-input">
                        <input type="text" id="awsRegion" placeholder="区域 (如 us-east-1)" class="mac-input" value="us-east-1">
                    </div>
                    <div id="lmstudioExtraFields" class="hidden" style="margin-top:8px; display:flex; flex-direction:column; gap:6px;">
                        <input type="text" id="lmstudioEndpoint" placeholder="服务地址 (如 http://localhost:1234)" class="mac-input" value="http://localhost:1234">
                    </div>
                </div>

                <div class="form-group">
                    <span class="form-label">模型选择</span>
                    <select id="modelSelect" class="mac-select"></select>
                </div>

                <div class="form-group">
                    <span class="form-label">译文语言</span>
                    <select id="targetLangSelect" class="mac-select">
                        <option value="zh" selected>中文</option>
                        <option value="en">English</option>
                        <option value="de">Deutsch</option>
                        <option value="es">Español</option>
                        <option value="ja">日本語</option>
                    </select>
                </div>

                <div class="form-group">
                    <span class="form-label">翻译风格</span>
                    <select id="translationStyleSelect" class="mac-select">
                        <option value="literal">直译模式</option>
                        <option value="faithful_natural" selected>忠实自然模式</option>
                        <option value="literary_polish">文学润色模式</option>
                        <option value="academic">学术论文模式</option>
                    </select>
                </div>

                <div class="form-group">
                    <span class="form-label">术语策略</span>
                    <select id="termHandlingSelect" class="mac-select">
                        <option value="translate">翻译为目标语言</option>
                        <option value="keep_source">保留原文</option>
                    </select>
                </div>

                <button id="startBtn" class="mac-btn mac-btn-primary">开始翻译</button>

                <div id="downloadSection" class="hidden">
                    <button id="dlTextBtn" class="mac-btn">下载中文文档 (TXT)</button>
                    <button id="dlDictBtn" class="mac-btn">下载新增术语 (CSV)</button>
                    <button id="dlMergedDictBtn" class="mac-btn hidden">下载术语合集 (CSV)</button>
                    <div class="form-group" style="margin-bottom:0; margin-top:4px;">
                        <span class="form-label">换行格式</span>
                        <select id="lineEndingSelect" class="mac-select">
                            <option value="mac" selected>Mac / Linux</option>
                            <option value="windows">Windows</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="mac-main">
                <div class="log-header">
                    <span>终端监控</span>
                    <div id="spinner" class="spinner hidden"></div>
                </div>
                <div id="logArea">等待任务初始化...</div>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const selectedFileName = document.getElementById('selectedFileName');
        const glossaryInput = document.getElementById('glossaryInput');
        const glossaryFileName = document.getElementById('glossaryFileName');
        const providerSelect = document.getElementById('providerSelect');
        const apiKeyInput = document.getElementById('apiKey');
        const modelSelect = document.getElementById('modelSelect');
        const translationStyleSelect = document.getElementById('translationStyleSelect');
        const targetLangSelect = document.getElementById('targetLangSelect');
        const termHandlingSelect = document.getElementById('termHandlingSelect');
        const lineEndingSelect = document.getElementById('lineEndingSelect');
        const startBtn = document.getElementById('startBtn');
        const logArea = document.getElementById('logArea');
        const spinner = document.getElementById('spinner');
        const downloadSection = document.getElementById('downloadSection');
        const dlTextBtn = document.getElementById('dlTextBtn');
        const dlDictBtn = document.getElementById('dlDictBtn');
        const dlMergedDictBtn = document.getElementById('dlMergedDictBtn');

        const providerModels = {
            mistral: [
                { value: "mistral-small-latest", text: "mistral-small-latest" },
                { value: "mistral-large-latest", text: "mistral-large-latest" }
            ],
            xai: [
                { value: "grok-4.20-non-reasoning", text: "grok-4.20-non-reasoning" },
                { value: "grok-4.3", text: "grok-4.3" }
            ],
            openai: [
                { value: "gpt-5.4-nano", text: "gpt-5.4-nano" },
                { value: "gpt-5.4-mini", text: "gpt-5.4-mini" },
                { value: "gpt-4o-mini", text: "gpt-4o-mini" }
            ],
            deepseek: [
                { value: "deepseek-v4-flash", text: "deepseek-v4-flash" },
                { value: "deepseek-v4-pro", text: "deepseek-v4-pro" }
            ],
            moonshot: [
                { value: "kimi-k2.6", text: "kimi-k2.6" }
            ],
            minimax: [
                { value: "MiniMax-M2.7-highspeed", text: "MiniMax-M2.7-highspeed" }
            ],
            bigmodel: [
                { value: "glm-4.5", text: "glm-4.5" },
                { value: "glm-4.5-air", text: "glm-4.5-air" }
            ],
            google: [
                { value: "gemini-flash-latest", text: "gemini-flash-latest" },
                { value: "gemini-flash-lite-latest", text: "gemini-flash-lite-latest" }
            ],
            anthropic: [{ value: "claude-haiku-4-5", text: "claude-haiku-4-5" }],
            qwen: [
                { value: "qwen-long-latest", text: "qwen-long-latest" }
            ],
            bedrock: [
                { value: "mistral.mistral-large-3-675b-instruct", text: "Mistral Large 3 (675B)" }
            ],
            lmstudio: [
                { value: "gemma-4-e4b", text: "Gemma 4 E4B" }
            ]
        };

        const openAICompatibleEndpoints = {
            mistral: "https://api.mistral.ai/v1/chat/completions",
            xai: "https://api.x.ai/v1/chat/completions",
            openai: "https://api.openai.com/v1/chat/completions",
            deepseek: "https://api.deepseek.com/chat/completions",
            moonshot: "https://api.moonshot.cn/v1/chat/completions",
            minimax: "https://api.minimaxi.com/v1/chat/completions",
            bigmodel: "https://open.bigmodel.cn/api/paas/v4/chat/completions"
        };

        function resolveTemperature(provider, model, translationStyle) {
            if (provider === 'openai' && /^gpt-5(\.|\-)/i.test(model)) {
                return null;
            }
            if (provider === 'moonshot' && model === 'kimi-k2.6') {
                return 1;
            }
            return translationStyle === 'literary_polish' ? 0.7 : 0.3;
        }

        function updateModels() {
            const provider = providerSelect.value;
            const models = providerModels[provider] || [];
            modelSelect.innerHTML = '';

            const placeholder = document.createElement('option');
            placeholder.value = '';
            placeholder.textContent = '请选择模型';
            placeholder.disabled = true;
            placeholder.selected = true;
            modelSelect.appendChild(placeholder);

            models.forEach(model => {
                const option = document.createElement('option');
                option.value = model.value;
                option.textContent = model.text;
                modelSelect.appendChild(option);
            });

            if (models.length) {
                modelSelect.value = models[0].value;
            }

            const isBedrock = provider === 'bedrock';
            const isLMStudio = provider === 'lmstudio';
            const awsFields = document.getElementById('awsExtraFields');
            const lmFields = document.getElementById('lmstudioExtraFields');
            awsFields.classList.toggle('hidden', !isBedrock);
            if (isBedrock) awsFields.style.display = 'flex';
            else awsFields.style.display = '';
            lmFields.classList.toggle('hidden', !isLMStudio);
            if (isLMStudio) lmFields.style.display = 'flex';
            else lmFields.style.display = '';
            document.getElementById('apiKey').placeholder = isBedrock ? 'AWS Access Key ID' : 'API Key';
            // LM Studio 本地服务不需要 API Key，隐藏输入框
            document.getElementById('apiKey').style.display = isLMStudio ? 'none' : '';
        }

        // ─── localStorage persistence (provider + per-provider keys) ────────
        const STORAGE_KEY = 'ai_translator_prefs';

        function savePrefs() {
            try {
                const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
                const keys = saved.keys || {};
                keys[providerSelect.value] = apiKeyInput.value;
                const bedrock = saved.bedrock || {};
                if (providerSelect.value === 'bedrock') {
                    bedrock.secretKey = document.getElementById('awsSecretKey').value;
                    bedrock.region = document.getElementById('awsRegion').value;
                }
                const lmstudio = saved.lmstudio || {};
                if (providerSelect.value === 'lmstudio') {
                    lmstudio.endpoint = document.getElementById('lmstudioEndpoint').value;
                }
                localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    provider: providerSelect.value,
                    keys,
                    bedrock,
                    lmstudio
                }));
            } catch (_) {}
        }

        function loadPrefs() {
            try {
                const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
                if (saved.provider && providerSelect.querySelector(`option[value="${saved.provider}"]`)) {
                    providerSelect.value = saved.provider;
                }
                updateModels();
                const keys = saved.keys || {};
                apiKeyInput.value = keys[providerSelect.value] || '';
                if (saved.bedrock) {
                    document.getElementById('awsSecretKey').value = saved.bedrock.secretKey || '';
                    document.getElementById('awsRegion').value = saved.bedrock.region || 'us-east-1';
                }
                if (saved.lmstudio) {
                    document.getElementById('lmstudioEndpoint').value = saved.lmstudio.endpoint || 'http://localhost:1234';
                }
            } catch (_) {
                updateModels();
            }
        }

        providerSelect.addEventListener('change', () => {
            updateModels();
            // Auto-fill the saved key for the newly selected provider
            try {
                const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
                apiKeyInput.value = (saved.keys || {})[providerSelect.value] || '';
            } catch (_) {
                apiKeyInput.value = '';
            }
        });

        loadPrefs();

        const targetLangConfig = {
            zh: {
                name: '中文', promptTarget: '地道、流畅的中文',
                glossaryHeader: '原文,zh', downloadLabel: '下载中文文档 (TXT)',
                outputTag: '中文译文', xmlHint: '翻译好的中文段落',
                countFn: text => (text.match(/[\u4e00-\u9fff]/g) || []).length,
                countUnit: '中文总字数'
            },
            en: {
                name: '英语', promptTarget: 'natural, fluent English',
                glossaryHeader: '原文,en', downloadLabel: '下载英文文档 (TXT)',
                outputTag: '英文译文', xmlHint: 'your translated English paragraphs',
                countFn: text => (text.match(/[A-Za-z]+(?:'[A-Za-z]+)?/g) || []).length,
                countUnit: '英文总词数'
            },
            de: {
                name: '德语', promptTarget: 'natürliches, flüssiges Deutsch',
                glossaryHeader: '原文,de', downloadLabel: '下载德文文档 (TXT)',
                outputTag: '德文译文', xmlHint: 'your translated German paragraphs',
                countFn: text => (text.match(/[A-Za-zÄÖÜäöüß]+/g) || []).length,
                countUnit: '德文总词数'
            },
            es: {
                name: '西班牙语', promptTarget: 'español natural y fluido',
                glossaryHeader: '原文,es', downloadLabel: '下载西班牙文文档 (TXT)',
                outputTag: '西文译文', xmlHint: 'your translated Spanish paragraphs',
                countFn: text => (text.match(/[A-Za-záéíóúñüÁÉÍÓÚÑÜ]+/g) || []).length,
                countUnit: '西文总词数'
            },
            ja: {
                name: '日语', promptTarget: '自然で流暢な日本語',
                glossaryHeader: '原文,ja', downloadLabel: '下载日文文档 (TXT)',
                outputTag: '日文译文', xmlHint: '翻訳した日本語の段落',
                countFn: text => (text.match(/[\u3040-\u309f\u30a0-\u30ff\u4e00-\u9fff]/g) || []).length,
                countUnit: '日文总字数'
            }
        };

        function detectPrimaryLanguage(text) {
            const sample = text.slice(0, 3000);
            const cjk = (sample.match(/[\u4e00-\u9fff]/g) || []).length;
            const kana = (sample.match(/[\u3040-\u309f\u30a0-\u30ff]/g) || []).length;
            const latin = (sample.match(/[A-Za-z]/g) || []).length;
            const deChars = (sample.match(/[ÄÖÜäöüß]/g) || []).length;
            const esChars = (sample.match(/[áéíóúñü¿¡]/g) || []).length;
            if (kana > 50) return 'ja';
            if (cjk > latin) return 'zh';
            if (deChars > 10) return 'de';
            if (esChars > 10) return 'es';
            if (latin > cjk) return 'en';
            return null;
        }

        targetLangSelect.addEventListener('change', () => {
            const lang = targetLangConfig[targetLangSelect.value];
            if (sourceFormat === 'srt') {
                dlTextBtn.textContent = `下载${lang.name}字幕 (SRT)`;
            } else {
                dlTextBtn.textContent = lang.downloadLabel;
            }
        });

        fileInput.addEventListener('change', () => {
            if (!fileInput.files.length) {
                selectedFileName.textContent = '未选择文件';
                return;
            }
            const file = fileInput.files[0];
            selectedFileName.textContent = file.name;
        });

        let glossary = {};
        let rawGlossaryText = null;
        let mergedGlossaryCSV = null;
        let glossaryOriginalName = '';

        const glossaryBtn = document.getElementById('glossaryBtn');

        function loadGlossaryFile(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = () => {
                    glossaryOriginalName = file.name;
                    glossaryFileName.textContent = file.name;
                    rawGlossaryText = reader.result;
                    if (rawGlossaryText && rawGlossaryText.charCodeAt(0) === 0xFEFF) {
                        rawGlossaryText = rawGlossaryText.slice(1);
                    }
                    resolve();
                };
                reader.readAsText(file);
            });
        }

        function clearGlossary() {
            glossaryFileName.textContent = '';
            rawGlossaryText = null;
            glossaryOriginalName = '';
            mergedGlossaryCSV = null;
        }

        glossaryBtn.addEventListener('click', () => {
            glossaryInput.value = '';
            glossaryInput.click();
        });

        glossaryInput.addEventListener('change', async () => {
            if (!glossaryInput.files.length) {
                clearGlossary();
                return;
            }
            await loadGlossaryFile(glossaryInput.files[0]);
        });

            const protector = createProtector();
            const lines = normalizePlainText(markdown).split("\n");
            const output = [];
            let inFence = false;
            let fenceMarker = "";
            let fenceBuffer = [];

            const flushFence = () => {
                if (!fenceBuffer.length) return;
                const raw = fenceBuffer.join("\n");
                output.push(protector.protect(raw));
                fenceBuffer = [];
            };

            for (const line of lines) {
                const fenceMatch = line.match(/^\s*(```|~~~)/);
                if (fenceMatch) {
                    if (inFence) {
                        fenceBuffer.push(line);
                        flushFence();
                        inFence = false;
                        fenceMarker = "";
                    } else {
                        inFence = true;
                        fenceMarker = fenceMatch[1];
                        fenceBuffer = [line];
                    }
                    continue;
                }

                    fenceBuffer.push(line);
                    continue;
                }

                    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, "$1")
                    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, "$1 ($2)")
                    .replace(/^#{1,6}\s+/, "")
                    .replace(/^>\s?/, "> ")
                    .replace(/^(\s*[-*+])\s+/, "$1 ")
                    .replace(/^(\s*\d+\.)\s+/, "$1 ")
                    .replace(/\*\*(.*?)\*\*/g, "$1")
                    .replace(/__(.*?)__/g, "$1")
                    .replace(/\*(.*?)\*/g, "$1")
                    .replace(/_(.*?)_/g, "$1")
                    .replace(/~~(.*?)~~/g, "$1");

                output.push(out);
            }

                flushFence();
            }

                text: output.join("\n").replace(/\n{3,}/g, "\n\n").trim(),
                format: "md",
                segments: protector.segments

            const blockTags = new Set([

                "figcaption", "figure", "footer", "form", "h1", "h2", "h3", "h4", "h5", "h6",
                "header", "hr", "li", "main", "nav", "ol", "p", "pre", "section", "table",
                "tbody", "thead", "tfoot", "tr", "td", "th", "ul"

            const walk = (node) => {
                if (!node) return "";
                if (node.nodeType === Node.TEXT_NODE) {
                    return node.nodeValue || "";
                }
                if (node.nodeType !== Node.ELEMENT_NODE) return "";

                const tag = node.tagName.toLowerCase();
                if (skipTags.has(tag)) return "";
                if (tag === "br" || tag === "hr") return "\n";
                if (tag === "img") return node.getAttribute("alt") || "";

                let content = "";

                    content += walk(child);
                }

                if (tag === "li") {
                    content = `- ${content.trim()}`;
                }

                if (tag === "td" || tag === "th") {

                }

                if (blockTags.has(tag)) {
                    return `\n${content.trim()}\n`;
                }

                return content;
            };

            const text = walk(body)
                .replace(/[\t ]+\n/g, "\n")
                .replace(/\n{3,}/g, "\n\n")
                .trim();

            return {
                text,
                format: "html",
                segments: protector.segments
            };

        function parseSRT(raw) {
            const normalized = raw.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            const blocks = normalized.split(/\n\n+/);
            const entries = [];

            for (const block of blocks) {
                const lines = block.trim().split('\n');
                if (lines.length < 2) continue;

                const index = lines[0].trim();
                const timecode = lines[1].trim();
                const text = lines.length > 2 ? lines.slice(2).join('\n') : '';

                if (index && timecode) {
                    entries.push({ index, timecode, text });
                }
            }

            return entries;
        }

        function validateSRT(entries) {
            if (entries.length < 2) return false;

            const timecodeRegex = /^\d{2}:\d{2}:\d{2},\d{3}\s*-->\s*\d{2}:\d{2}:\d{2},\d{3}/;
            const checkCount = Math.min(entries.length, 10);
            let validCount = 0;

            for (let i = 0; i < checkCount; i++) {
                const entry = entries[i];
                if (/^\d+$/.test(entry.index) && timecodeRegex.test(entry.timecode)) {
                    validCount++;
                }
            }

            return validCount >= checkCount * 0.8;
        }

            result = result.replace(/<\/?(?:i|b|u|font)[^>]*>/gi, match => protector.protect(match));

                    current = [];

        async function hmacSHA256(key, msg) {

        async function buildBedrockHeaders(url, bodyStr, accessKeyId, secretKey, region) {
            const service = 'bedrock';
            const now = new Date();
            const p = n => String(n).padStart(2, '0');
            const amzDate = `${now.getUTCFullYear()}${p(now.getUTCMonth()+1)}${p(now.getUTCDate())}T${p(now.getUTCHours())}${p(now.getUTCMinutes())}${p(now.getUTCSeconds())}Z`;
            const dateStamp = amzDate.slice(0, 8);
            const urlObj = new URL(url);
            const bodyHash = await sha256Hex(bodyStr);
            const canonicalHeaders = `content-type:application/json\nhost:${urlObj.host}\nx-amz-date:${amzDate}\n`;
            const signedHeaders = 'content-type;host;x-amz-date';
            const canonicalReq = ['POST', urlObj.pathname, '', canonicalHeaders, signedHeaders, bodyHash].join('\n');
            const credScope = `${dateStamp}/${region}/${service}/aws4_request`;
            const stringToSign = ['AWS4-HMAC-SHA256', amzDate, credScope, await sha256Hex(canonicalReq)].join('\n');
            let sk = await hmacSHA256(`AWS4${secretKey}`, dateStamp);
            sk = await hmacSHA256(sk, region);
            sk = await hmacSHA256(sk, service);
            sk = await hmacSHA256(sk, 'aws4_request');
            const sig = Array.from(await hmacSHA256(sk, stringToSign)).map(b => b.toString(16).padStart(2, '0')).join('');

                'Content-Type': 'application/json',
                'x-amz-date': amzDate,
                'Authorization': `AWS4-HMAC-SHA256 Credential=${accessKeyId}/${credScope}, SignedHeaders=${signedHeaders}, Signature=${sig}`

            } else if (provider === 'anthropic') {
                const anthropicBody = {
                    model: model,
                    system: systemPrompt,
                    messages: [{ role: "user", content: chunk }],
                    max_tokens: 8192
                };
                if (temperature !== null) {
                    anthropicBody.temperature = temperature;
                }
                response = await fetch("https://api.anthropic.com/v1/messages", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "x-api-key": apiKey,
                        "anthropic-version": "2023-06-01",
                        "anthropic-dangerous-direct-browser-access": "true"
                    },
                    body: JSON.stringify(anthropicBody),
                    signal: signal
                });
                if (!response.ok) throw new Error(`API Error ${response.status}: ${await response.text()}`);
                data = await response.json();
                content = data.content?.[0]?.text || "";
                usage = { prompt_tokens: data.usage?.input_tokens, completion_tokens: data.usage?.output_tokens };
            } else if (provider === 'qwen') {
                const qwenBody = {
                    model: model,
                    messages: [{ role: "user", content: `${systemPrompt}\n\n${chunk}` }]
                };
                if (temperature !== null) {
                    qwenBody.temperature = temperature;
                }
                response = await fetch("https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${apiKey}`
                    },
                    body: JSON.stringify(qwenBody),
                    signal: signal
                });
                if (!response.ok) throw new Error(`API Error ${response.status}: ${await response.text()}`);
                data = await response.json();
                content = data.choices?.[0]?.message?.content || "";
                usage = { prompt_tokens: data.usage?.prompt_tokens, completion_tokens: data.usage?.completion_tokens };
            } else if (provider === 'bedrock') {
                const awsSecretKey = document.getElementById('awsSecretKey').value.trim();
                const awsRegion = document.getElementById('awsRegion').value.trim() || 'us-east-1';
                const endpoint = `https://bedrock-runtime.${awsRegion}.amazonaws.com/model/${encodeURIComponent(model)}/converse`;
                const bedrockInferenceConfig = { maxTokens: 8192 };
                if (temperature !== null) {
                    bedrockInferenceConfig.temperature = temperature;
                }
                const bedrockBody = JSON.stringify({
                    system: [{ text: systemPrompt }],
                    messages: [{ role: 'user', content: [{ text: chunk }] }],
                    inferenceConfig: bedrockInferenceConfig
                });
                const bedrockHeaders = await buildBedrockHeaders(endpoint, bedrockBody, apiKey, awsSecretKey, awsRegion);
                response = await fetch(endpoint, {
                    method: 'POST',
                    headers: bedrockHeaders,
                    body: bedrockBody,
                    signal
                });
                if (!response.ok) throw new Error(`API Error ${response.status}: ${await response.text()}`);
                data = await response.json();
                content = data.output?.message?.content?.[0]?.text || '';
                usage = { prompt_tokens: data.usage?.inputTokens, completion_tokens: data.usage?.outputTokens };
            } else if (isLMStudio) {
                const lmEndpoint = (document.getElementById('lmstudioEndpoint').value.trim() || 'http://localhost:1234').replace(/\/$/, '');
                const lmUrl = `${lmEndpoint}/v1/chat/completions`;
                const lmPayload = {
                    model: model,
                    messages: [{ role: "system", content: systemPrompt }, { role: "user", content: chunk }]
                };
                if (temperature !== null) {
                    lmPayload.temperature = temperature;
                }
                response = await fetch(lmUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(lmPayload),
                    signal: signal
                });
                if (!response.ok) throw new Error(`LM Studio API Error ${response.status}: ${await response.text()}`);
                data = await response.json();
                content = data.choices?.[0]?.message?.content || "";
                usage = { prompt_tokens: data.usage?.prompt_tokens || 0, completion_tokens: data.usage?.completion_tokens || 0 };
            }

            return { content, usage };
        }

        function parseGlossaryTerms(rawContent) {
            const terms = [];
            const glossMatch = rawContent.match(/<glossary>([\s\S]*?)<\/glossary>/i);
            if (glossMatch && glossMatch[1]) {
                const lines = glossMatch[1].trim().split('\n');
                for (let line of lines) {
                    if (line.includes('=')) {
                        let [source, target] = line.split('=');
                        source = source.replace(/\[|\]/g, '').trim();
                        target = target.replace(/\[|\]/g, '').trim();
                        if (source && target) terms.push({ source, target });
                    }
                }
            }
            return terms;
        }

        function parseResponse(rawContent) {
            let translation = "";

            const transMatch = rawContent.match(/<translation>([\s\S]*?)<\/translation>/i);
            if (transMatch && transMatch[1]) {
                translation = transMatch[1].trim();
            } else {
                translation = rawContent.trim();
            }

            return { translation, newTerms: parseGlossaryTerms(rawContent) };
        }

        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type: type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function glossaryToCSV(data, lineEnding = '\n', header = '原文,译文') {
            const escapeCSV = (value) => {
                const text = String(value ?? "");
                return `"${text.replaceAll('"', '""')}"`;
            };
            const lines = [header];
            for (const [eng, chi] of Object.entries(data)) {
                lines.push(`${escapeCSV(eng)},${escapeCSV(chi)}`);
            }
            return "\ufeff" + lines.join(lineEnding);
        }

        function normalizeLineEndings(text, mode) {
            return mode === 'windows' ? text.replace(/\r?\n/g, '\r\n') : text.replace(/\r\n/g, '\n');
        }

        function normalizeTextFormat(text) {
            return text
                .split(/\n/)
                .map(line => line.trim())
                .filter(line => line.length > 0)
                .join('\n\n');
        }

        function cancelTranslation() {
            isTranslating = false;
            abortController = null;
            startBtn.textContent = "开始翻译";
            startBtn.classList.remove('is-translating');
            spinner.classList.add('hidden');
            logArea.innerHTML = "";
            log("用户取消操作。");
        }

        startBtn.addEventListener('click', async () => {
            if (isTranslating) {
                if (confirm("确定要终止当前的翻译任务吗？已翻译的部分将保留并可下载。")) {
                    if (abortController) abortController.abort();
                    startBtn.textContent = "正在终止...";
                    startBtn.disabled = true;
                }
                return;
            }

            const file = fileInput.files[0];
            const provider = providerSelect.value;
            const apiKey = apiKeyInput.value.trim();
            const model = modelSelect.value;
            const translationStyle = translationStyleSelect.value;
            const termHandling = termHandlingSelect.value;
            const targetLang = targetLangSelect.value;
            const lang = targetLangConfig[targetLang] || targetLangConfig.zh;

            if (!file) {
                alert("请选择需翻译的文档");
                return;
            }
            if (!apiKey && provider !== 'lmstudio') {
                alert("请提供对应的 API Key");
                return;
            }

            savePrefs();

            isTranslating = true;
            abortController = new AbortController();
            startBtn.textContent = "终止翻译";
            startBtn.classList.add('is-translating');

            spinner.classList.remove('hidden');
            downloadSection.classList.add('hidden');
            logArea.innerHTML = "";

            glossary = {};
            newGlossaryTerms = {};
            preloadedGlossaryKeys = new Set();
            translatedText = "";
            translationMemory = [];
            protectedSegments = [];
            sourceFormat = "txt";

            if (rawGlossaryText) {
                const lines = rawGlossaryText.split(/\r?\n/).filter(l => l.trim());
                if (lines.length >= 2) {
                    const headers = parseCSVRow(lines[0]);
                    if (headers.length >= 2 && headers[1].trim().toLowerCase() === targetLang) {
                        let count = 0;
                        for (let i = 1; i < lines.length; i++) {
                            const fields = parseCSVRow(lines[i]);
                            const source = (fields[0] || '').trim();
                            const target = (fields[1] || '').trim();
                            if (source && target) {
                                glossary[source] = target;
                                preloadedGlossaryKeys.add(source);
                                count++;
                            }
                        }
                        log(`术语表已加载 (${count} 条${lang.name}预设)`, "term");
                    } else {
                        const foundCol = headers.length >= 2 ? headers[1].trim() : '未知';
                        log(`术语表语言列为 "${foundCol}"，与目标语言 "${targetLang}" 不一致，跳过预加载`, "warn");
                    }
                }
            }

            let totalPromptTokens = 0;
            let totalCompletionTokens = 0;
            let failedChunksCount = 0;
            let userAborted = false;

            try {
                translationStartTime = Date.now();
                const detectedFormat = detectFileFormat(file);
                let isSRTMode = false;
                let srtEntries = [];
                let srtProtector = null;
                let srtTranslationsMap = {};
                let totalChunksCount = 0;

                // SRT 检测与验证
                if (detectedFormat === 'srt') {
                    const raw = await file.text();
                    srtEntries = parseSRT(raw);
                    if (validateSRT(srtEntries)) {
                        isSRTMode = true;
                        sourceFormat = 'srt';
                    } else {
                        log('文件不符合 SRT 字幕格式，将按纯文本处理。', 'warn');
                    }
                }

                if (isSRTMode) {
                    // ═══════ SRT 字幕翻译管线 ═══════
                    srtProtector = createProtector();
                    for (const entry of srtEntries) {
                        entry.protectedText = protectSRTTags(entry.text, srtProtector);
                    }

                    const allSubText = srtEntries.map(e => e.text).join(' ');
                    sourceWordCount = countLatinWords(allSubText);
                    const detectedLang = detectPrimaryLanguage(allSubText);
                    if (detectedLang && detectedLang === targetLang) {
                        if (!confirm(`检测到原文可能已是${lang.name}。继续翻译将变为润色/改写模式，是否继续？`)) {
                            cancelTranslation();
                            return;
                        }
                        log(`用户确认以润色模式继续处理${lang.name}字幕`, "warn");
                    }

                    log(`读取文件: ${file.name} | 格式: SRT | 字幕条数: ${srtEntries.length}`);
                    log(`请求通道: ${provider.toUpperCase()} | 模型: ${model} | 目标语言: ${lang.name}`);
                    log(`术语策略: ${termHandling === 'keep_source' ? '保留原文' : '译为' + lang.name}`);

                    const srtBatches = chunkSRTEntries(srtEntries, 40);
                    totalChunksCount = srtBatches.length;
                    setLiveState('提取完成', `已分割为 ${srtBatches.length} 个区块 (${srtEntries.length} 条字幕)`, { totalChunks: srtBatches.length, chunk: 0, retryCount: 0, error: null });
                    log(`字幕已分割为 ${srtBatches.length} 个区块 (共 ${srtEntries.length} 条)，开始处理任务...`, "success");

                    let batchOffset = 0;
                    for (let i = 0; i < srtBatches.length; i++) {
                        if (abortController.signal.aborted) {
                            log(`任务被手动终止。`, "warn");
                            userAborted = true;
                            break;
                        }

                        const batch = srtBatches[i];
                        setLiveState('翻译中', `翻译区块 ${i + 1}/${srtBatches.length}`, { chunk: i + 1, totalChunks: srtBatches.length, retryCount: 0, error: null });
                        log(`处理区块 [${i + 1}/${srtBatches.length}] (字幕 ${batchOffset + 1}–${batchOffset + batch.length}) ...`);

                        let success = false;
                        let attempt = 0;
                        const maxAttempts = 5;

                        while (!success && attempt < maxAttempts) {
                            attempt++;
                            try {
                                const contextMemory = buildContextMemory();
                                const batchXML = formatSRTBatch(batch);
                                const apiResult = await callAI(batchXML, apiKey, provider, model, translationStyle, termHandling, targetLang, abortController.signal, contextMemory, 'srt');
                                const parsed = parseSRTBatchResponse(apiResult.content);

                                if (apiResult.usage) {
                                    totalPromptTokens += apiResult.usage.prompt_tokens || 0;
                                    totalCompletionTokens += apiResult.usage.completion_tokens || 0;
                                }

                                for (const [localIdStr, text] of Object.entries(parsed.translations)) {
                                    const localIdx = parseInt(localIdStr) - 1;
                                    if (localIdx >= 0 && localIdx < batch.length) {
                                        srtTranslationsMap[batchOffset + localIdx] = text;
                                    }
                                }

                                const batchSummary = Object.values(parsed.translations).join(' ');
                                updateTranslationMemory(batchSummary);

                                for (const term of parsed.newTerms) {
                                    if (!glossary[term.source]) {
                                        glossary[term.source] = term.target;
                                        newGlossaryTerms[term.source] = term.target;
                                        log(`提取术语: ${term.source} -> ${term.target}`, "term");
                                    }
                                }

                                setLiveState('翻译中', `区块 ${i + 1}/${srtBatches.length} 已完成`, { chunk: i + 1, totalChunks: srtBatches.length, retryCount: attempt - 1, error: null });
                                log(`区块 [${i + 1}] 完成 (${batch.length} 条字幕)` + (attempt > 1 ? ` (重试 ${attempt-1} 次)` : ''), "success");
                                success = true;
                            } catch (err) {
                                if (err.name === 'AbortError') throw err;

                                setLiveState('重试中', `区块 ${i + 1}/${srtBatches.length} 第 ${attempt}/${maxAttempts} 次`, { chunk: i + 1, totalChunks: srtBatches.length, retryCount: attempt, error: err.message });
                                log(`区块 [${i + 1}] 异常 (尝试 ${attempt}/${maxAttempts}): ${err.message}`, "warn");
                                if (attempt < maxAttempts) {
                                    const waitTime = Math.pow(2, attempt);
                                    log(`系统等待 ${waitTime} 秒后重试...`);
                                    await sleep(waitTime * 1000);
                                }
                            }
                        }

                        if (!success && !abortController.signal.aborted) {
                            log(`区块 [${i + 1}] 经 ${maxAttempts} 次重试依旧失败，该批次字幕将保留原文。`, "error");
                            setLiveState('错误', `区块 ${i + 1}/${srtBatches.length} 翻译失败`, { chunk: i + 1, totalChunks: srtBatches.length, error: '多次重试后仍失败' });
                            failedChunksCount++;
                        }

                        batchOffset += batch.length;

                        if (!abortController.signal.aborted) {
                            await sleep(1000);
                        }
                    }

                    // 组装最终 SRT
                    translatedText = reassembleSRT(srtEntries, srtTranslationsMap, srtProtector.segments);

                } else {
                    // ═══════ 文档翻译管线 (TXT/MD/HTML) ═══════
                    const extracted = await extractSourceText(file);
                    const text = extracted.text;
                    sourceFormat = extracted.format;
                    protectedSegments = extracted.segments || [];
                    sourceWordCount = countLatinWords(text);
                    const detectedLang = detectPrimaryLanguage(text);
                    if (detectedLang && detectedLang === targetLang) {
                        if (!confirm(`检测到原文可能已是${lang.name}。继续翻译将变为润色/改写模式，是否继续？`)) {
                            cancelTranslation();
                            return;
                        }
                        log(`用户确认以润色模式继续处理${lang.name}文档`, "warn");
                    }
                    log(`读取文件: ${file.name} | 格式: ${formatFileLabel(sourceFormat)} | 大小: ${(text.length/1024).toFixed(2)} KB`);
                    log(`请求通道: ${provider.toUpperCase()} | 模型: ${model} | 目标语言: ${lang.name}`);
                    log(`术语策略: ${termHandling === 'keep_source' ? '保留原文' : '译为' + lang.name}`);

                    const chunks = chunkText(text, 5000);
                    totalChunksCount = chunks.length;
                    setLiveState('提取完成', `已分割为 ${chunks.length} 个区块`, { totalChunks: chunks.length, chunk: 0, retryCount: 0, error: null });
                    log(`文档已分割为 ${chunks.length} 个区块，开始处理任务...`, "success");

                    for (let i = 0; i < chunks.length; i++) {
                        if (abortController.signal.aborted) {
                            log(`任务被手动终止。`, "warn");
                            userAborted = true;
                            break;
                        }

                        setLiveState('翻译中', `翻译区块 ${i + 1}/${chunks.length}`, { chunk: i + 1, totalChunks: chunks.length, retryCount: 0, error: null });
                        log(`处理区块 [${i + 1}/${chunks.length}] ...`);

                        let success = false;
                        let attempt = 0;
                        const maxAttempts = 5;

                        while (!success && attempt < maxAttempts) {
                            attempt++;
                            try {
                                const contextMemory = buildContextMemory();
                                const apiResult = await callAI(chunks[i], apiKey, provider, model, translationStyle, termHandling, targetLang, abortController.signal, contextMemory);
                                const parsed = parseResponse(apiResult.content);

                                if (apiResult.usage) {
                                    totalPromptTokens += apiResult.usage.prompt_tokens || 0;
                                    totalCompletionTokens += apiResult.usage.completion_tokens || 0;
                                }

                                const restoredTranslation = restoreProtectedSegments(parsed.translation, protectedSegments);
                                setLiveState('翻译中', `区块 ${i + 1}/${chunks.length} 已完成`, { chunk: i + 1, totalChunks: chunks.length, retryCount: attempt - 1, error: null });

                                translatedText += restoredTranslation + "\n\n";
                                updateTranslationMemory(restoredTranslation);

                                for (const term of parsed.newTerms) {
                                    if (!glossary[term.source]) {
                                        glossary[term.source] = term.target;
                                        newGlossaryTerms[term.source] = term.target;
                                        log(`提取术语: ${term.source} -> ${term.target}`, "term");
                                    }
                                }

                                log(`区块 [${i + 1}] 完成` + (attempt > 1 ? ` (重试 ${attempt-1} 次)` : ''), "success");
                                success = true;
                            } catch (err) {
                                if (err.name === 'AbortError') throw err;

                                setLiveState('重试中', `区块 ${i + 1}/${chunks.length} 第 ${attempt}/${maxAttempts} 次`, { chunk: i + 1, totalChunks: chunks.length, retryCount: attempt, error: err.message });
                                log(`区块 [${i + 1}] 异常 (尝试 ${attempt}/${maxAttempts}): ${err.message}`, "warn");
                                if (attempt < maxAttempts) {
                                    const waitTime = Math.pow(2, attempt);
                                    log(`系统等待 ${waitTime} 秒后重试...`);
                                    await sleep(waitTime * 1000);
                                }
                            }
                        }

                        if (!success && !abortController.signal.aborted) {
                            log(`区块 [${i + 1}] 经 ${maxAttempts} 次重试依旧失败，已降级输出原文。`, "error");
                            setLiveState('错误', `区块 ${i + 1}/${chunks.length} 翻译失败，已降级输出原文`, { chunk: i + 1, totalChunks: chunks.length, error: '多次重试后仍失败' });
                            translatedText += `\n\n[系统提示：区块 ${i + 1} 翻译异常，输出原文]\n${restoreProtectedSegments(chunks[i], protectedSegments)}\n\n`;
                            failedChunksCount++;
                        }

                        if (!abortController.signal.aborted) {
                            await sleep(1000);
                        }
                    }
                }

                // ═══════ 共用完成逻辑 ═══════
                if (!userAborted) {
                    setLiveState('下载准备', '全部区块处理完毕', { chunk: totalChunksCount, totalChunks: totalChunksCount });
                    log(`全部区块处理完毕`, "success");
                }
                if (failedChunksCount > 0) {
                    log(`警报: 存在 ${failedChunksCount} 个区块处理失败并输出原文。`, "warn");
                }
                setLiveState('下载准备', '检索结束，等待下载', { error: null });
                log(`检索结束，共收录 ${Object.keys(glossary).length} 项专有术语。`);

                const totalTokens = totalPromptTokens + totalCompletionTokens;
                log(`Token 消耗结算:`, "stats");
                log(`输入 (Prompt): ${totalPromptTokens.toLocaleString()}`, "stats");
                log(`输出 (Completion): ${totalCompletionTokens.toLocaleString()}`, "stats");
                log(`总计: ${totalTokens.toLocaleString()}`, "stats");

            } catch (err) {
                if (err.name === 'AbortError') {
                    setLiveState('错误', '任务已中断', { error: '用户终止' });
                    log(`任务流已中断。已完成的部分可正常下载。`, "warn");
                } else {
                    setLiveState('错误', '任务异常', { error: err.message });
                    log(`任务致命异常: ${err.message}`, "error");
                }
            } finally {
                isTranslating = false;
                startBtn.disabled = false;
                startBtn.textContent = "开始翻译";
                startBtn.classList.remove('is-translating');
                spinner.classList.add('hidden');
                setLiveState('完成', '任务结束', { error: null });

                if (translationStartTime > 0) {
                    const elapsed = Date.now() - translationStartTime;
                    const targetCharCount = lang.countFn(translatedText);
                    log(`文档统计:`, "stats");
                    log(`原文词数: ${sourceWordCount.toLocaleString()}`, "stats");
                    log(`${lang.countUnit}: ${targetCharCount.toLocaleString()}`, "stats");
                    log(`翻译耗时: ${formatDuration(elapsed)}`, "stats");
                }

                // ─── 合并术语表（供下载术语合集使用） ───
                mergedGlossaryCSV = null;
                if (rawGlossaryText && Object.keys(newGlossaryTerms).length > 0) {
                    try {
                        const existingLines = rawGlossaryText.split(/\r?\n/).filter(l => l.trim());
                        const headerLine = existingLines.length > 0 ? existingLines[0] : `原文,${targetLang}`;
                        const existingMap = new Map();
                        for (let ei = 1; ei < existingLines.length; ei++) {
                            const fields = parseCSVRow(existingLines[ei]);
                            const src = (fields[0] || '').trim();
                            const tgt = (fields[1] || '').trim();
                            if (src) existingMap.set(src, tgt);
                        }

                        let addedCount = 0;
                        for (const [src, tgt] of Object.entries(newGlossaryTerms)) {
                            if (!existingMap.has(src)) {
                                existingMap.set(src, tgt);
                                addedCount++;
                            }
                        }

                        if (addedCount > 0) {
                            const sortedEntries = Array.from(existingMap.entries()).sort((a, b) => a[0].localeCompare(b[0]));
                            const escapeCSV = (value) => {
                                const text = String(value ?? "");
                                return `"${text.replaceAll('"', '""')}"`;
                            };
                            const csvLines = [headerLine];
                            for (const [src, tgt] of sortedEntries) {
                                csvLines.push(`${escapeCSV(src)},${escapeCSV(tgt)}`);
                            }
                            mergedGlossaryCSV = csvLines.join('\n');
                            rawGlossaryText = mergedGlossaryCSV;
                            log(`术语合集: ${addedCount} 条新增术语已合并 (共 ${sortedEntries.length} 条，已按原文排序)`, "term");
                        } else {
                            log(`术语合集: 无新增术语，术语表不变 (共 ${existingMap.size} 条)`, "term");
                        }
                    } catch (e) {
                        log(`术语合集处理失败: ${e.message}`, "warn");
                    }
                }

                if (sourceFormat === 'srt') {
                    dlTextBtn.textContent = `下载${lang.name}字幕 (SRT)`;
                } else {
                    dlTextBtn.textContent = lang.downloadLabel;
                }
                dlMergedDictBtn.classList.toggle('hidden', !mergedGlossaryCSV);
                downloadSection.classList.remove('hidden');
            }
        });

        function getBaseFileName(name) {
            return name.replace(/\.[^.]+$/, '');
        }

        function safeFileName(name) {
            return name.replace(/[\\/:*?"<>|]/g, '_');
        }

        function getStyleShortName(styleValue) {
            if (styleValue === 'literal') return '直译';
            if (styleValue === 'literary_polish') return '润色';
            if (styleValue === 'academic') return '学术';
            return '自然';
        }

        function buildOutputName(originalName, modelName, styleValue, langTag, ext) {
            const baseName = originalName ? getBaseFileName(originalName) : '文档';
            const safeModel = safeFileName(modelName || '模型');
            const styleName = getStyleShortName(styleValue);
            return safeFileName(`${baseName} ${langTag} ${safeModel} ${styleName}.${ext}`);
        }

        function buildGlossaryName(originalName, modelName, styleValue, langTag) {
            const baseName = originalName ? getBaseFileName(originalName) : '文档';
            const safeModel = safeFileName(modelName || '模型');
            const styleName = getStyleShortName(styleValue);
            return safeFileName(`${baseName} 术语表 ${safeModel} ${styleName}.csv`);
        }

        dlTextBtn.addEventListener('click', () => {
            const lang = targetLangConfig[targetLangSelect.value] || targetLangConfig.zh;
            const lineEndingMode = lineEndingSelect.value;
            const originalName = fileInput.files.length ? fileInput.files[0].name : (sourceFormat === 'srt' ? '字幕' : '文档');

            if (sourceFormat === 'srt') {
                const srtContent = normalizeLineEndings(translatedText, lineEndingMode);
                const outName = buildOutputName(originalName, modelSelect.value, translationStyleSelect.value, lang.outputTag, 'srt');
                downloadFile(srtContent, outName, "text/plain;charset=utf-8");
            } else {
                const normalized = normalizeTextFormat(translatedText);
                const txtContent = normalizeLineEndings(normalized, lineEndingMode);
                const outName = buildOutputName(originalName, modelSelect.value, translationStyleSelect.value, lang.outputTag, 'txt');
                downloadFile(txtContent, outName, "text/plain;charset=utf-8");
            }
        });

        dlDictBtn.addEventListener('click', () => {
            const lang = targetLangConfig[targetLangSelect.value] || targetLangConfig.zh;
            const lineEndingMode = lineEndingSelect.value;
            const csvLineEnding = lineEndingMode === 'windows' ? '\r\n' : '\n';
            const originalName = fileInput.files.length ? fileInput.files[0].name : '文档';
            const outName = buildGlossaryName(originalName, modelSelect.value, translationStyleSelect.value, lang.outputTag);
            downloadFile(glossaryToCSV(newGlossaryTerms, csvLineEnding, lang.glossaryHeader), outName, "text/csv;charset=utf-8");
        });

        dlMergedDictBtn.addEventListener('click', () => {
            if (!mergedGlossaryCSV) return;
            const lineEndingMode = lineEndingSelect.value;
            const content = '\ufeff' + normalizeLineEndings(mergedGlossaryCSV, lineEndingMode);
            const outName = glossaryOriginalName || '术语合集.csv';
            downloadFile(content, outName, 'text/csv;charset=utf-8');
        });
    </script>
</body>
</html>
